<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvoiceSnap</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Google site verification -->
  <meta name="google-site-verification" content="google10adf0c9bd448f02">
</head>

<body>

<div id="container">

  <!-- Header -->
  <header id="header_container">
    <h1 id="invoice_logo">InvoiceSnap</h1>
    <img id="company_logo" src="" alt="" style="max-height:60px; display:none;">
    <input type="file" id="logo_upload" accept="image/*">
  </header>

  <main id="main_container">

    <!-- Invoice Summary -->
    <div id="invoice_summary">
      <div class="summary">
        <h2>Invoice To</h2>
        <input type="text" id="customer_name">
      </div>
      <div class="summary">
        <h2>Invoice No</h2>
        <input type="text" id="invoice_no">
      </div>
      <div class="summary">
        <h2>Date</h2>
        <input type="date" id="invoice_date">
      </div>
      <div class="summary">
        <h2>Currency</h2>
        <select id="currency">
          <option value="$">USD $</option>
          <option value="€">EUR €</option>
          <option value="₺">TRY ₺</option>
          <option value="£">GBP £</option>
          <option value="¥">JPY ¥</option>
          <option value="C$">CAD C$</option>
          <option value="A$">AUD A$</option>
          <option value="CHF">CHF</option>
          <option value="₹">INR ₹</option>
          <option value="₽">RUB ₽</option>
          <option value="₩">KRW ₩</option>
          <option value="R$">BRL R$</option>
          <option value="MX$">MXN MX$</option>
          <option value="₫">VND ₫</option>
          <option value="₪">ILS ₪</option>
          <option value="₱">PHP ₱</option>
          <option value="₦">NGN ₦</option>
          <option value="د.إ">AED</option>
          <option value="﷼">SAR</option>
          <option value="₴">UAH</option>
          <option value="zł">PLN zł</option>
        </select>
      </div>
    </div>

    <!-- Invoice Table -->
    <div id="invoice_table">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Description</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Tax %</th>
            <th>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="invoice_items">
          <tr>
            <td>1</td>
            <td><input type="text" class="item_desc"></td>
            <td><input type="number" class="item_qty" value="1"></td>
            <td><input type="number" class="item_price" value="0"></td>
            <td><input type="number" class="item_tax" value="0"></td>
            <td class="item_total">$0.00</td>
            <td><button class="remove_item">X</button></td>
          </tr>
        </tbody>
      </table>
      <button id="add_item">Add Item</button>
    </div>

    <!-- Payment Summary -->
    <div id="payment_summary">
      <h3>Total: <span id="total">$0.00</span></h3>
    </div>

    <!-- Buttons -->
    <div id="buttons">
      <button onclick="window.print()">Download PDF</button>
      <button id="copy_invoice">Copy Invoice</button>
      <button id="share_invoice">Share Invoice</button>
      <button id="new_invoice">New Invoice</button>
      <button id="save_invoice">Save Invoice</button>
    </div>

    <!-- Watermark -->
    <p id="watermark">Created with <strong>InvoiceSnap</strong></p>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
